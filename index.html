<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Examen Visual Seguro - Blindaje Pro</title>
    <style>
        /* --- PROTECCIÓN Y BLOQUEOS --- */
        * {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            outline: none;
        }

        @media print { body { display: none !important; } }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: #f0f2f5; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            color: #333;
            overflow: hidden;
        }
        
        .container {
            background: white;
            padding: 20px 40px 40px 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            width: 95%;
            max-width: 950px; 
            text-align: center;
            position: relative;
        }

        .pregunta-box { display: none; }
        
        .texto-pregunta { 
            font-size: 1.6em; 
            margin: 20px 0; 
            display: block; 
            font-weight: bold;
            color: #1c1e21;
        }

        .bloque-contenido {
            width: 100%;
            max-width: 850px; 
            margin: 0 auto;
        }
        
        .imagen-pregunta {
            width: 100%;
            height: auto;
            max-height: 500px;
            object-fit: contain;
            margin-bottom: 35px;
            border-radius: 12px;
            display: block;
            border: 1px solid #f0f0f0;
            pointer-events: none;
        }

        .layout-etapa2 {
            display: flex;
            align-items: center;
            gap: 30px;
            text-align: left;
            margin-bottom: 30px;
        }
        .img-lateral {
            flex: 1;
            max-width: 400px;
            border-radius: 10px;
            border: 1px solid #ddd;
        }
        .columna-opciones {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .contenedor-opciones-circular {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            width: 100%;
            margin-bottom: 40px;
        }
        
        .contenedor-opciones-vertical {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            max-width: 500px;
            margin: 0 auto 40px auto;
        }

        .division-opcion {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .opcion-btn-circular {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            border: 2px solid #ced4da;
            background-color: #fff;
            cursor: pointer;
            font-size: 1.4em;
            color: #495057;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s ease-in-out;
        }

        .opcion-btn-vertical {
            width: 100%;
            padding: 18px 25px;
            border-radius: 12px;
            border: 2px solid #ced4da;
            background-color: #fff;
            cursor: pointer;
            font-size: 1.2em;
            text-align: left;
            transition: 0.2s;
            font-weight: 500;
            color: #1c1e21;
        }

        .opcion-btn-circular.seleccionada, .opcion-btn-vertical.seleccionada {
            background-color: #007bff;
            color: white;
            border-color: #007bff;
            box-shadow: 0 5px 15px rgba(0,123,255,0.4);
        }

        .timer-container {
            width: 300px;
            background-color: #e9ecef;
            border-radius: 20px;
            margin: 0 auto;
            height: 8px;
            overflow: hidden;
        }
        
        .timer-bar {
            height: 100%;
            width: 100%;
            background-color: #dc3545;
        }

        .contador-texto {
            font-size: 0.95em;
            color: #6c757d;
            margin-top: 12px;
        }

        .btn-primario { padding: 16px 35px; cursor: pointer; border-radius: 12px; border: none; background: #007bff; color: white; font-weight: bold; font-size: 1.1em; transition: 0.3s; }

        .btn-siguiente {
            margin-top: 20px;
            padding: 12px 45px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 1.1em;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-siguiente:hover { background-color: #218838; }
        .btn-siguiente:disabled { background-color: #ccc; cursor: not-allowed; opacity: 0.7; }

        #aviso-conexion {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.98);
            z-index: 9999;
            border-radius: 20px;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .loader-wrapper {
            position: relative;
            width: 120px;
            height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
        }

        .spinner-red {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 6px solid #f3f3f3;
            border-top: 6px solid #dc3545;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .logo-carga {
            width: 60px;
            height: 60px;
            object-fit: contain;
            z-index: 10;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body oncontextmenu="return false" onkeydown="return false" ondragstart="return false">

<div class="container">
    <div id="aviso-conexion">
        <div class="loader-wrapper">
            <div class="spinner-red"></div>
            <img src="https://cdn-icons-png.flaticon.com/512/1041/1041916.png" class="logo-carga" alt="Logo">
        </div>
        <strong style="color: #dc3545; font-size: 1.3em;">SIN CONEXIÓN</strong>
        <p id="texto-estado" style="color: #666;">Reintentando conectar cada segundo...</p>
    </div>

    <div id="pantalla-inicio">
        <h2>Examen de Percepción Visual</h2>
        <p style="margin-bottom: 35px; color: #4b4b4b;">15 segundos por pregunta. El tiempo reinicia si falla la red.</p>
        <button id="btnIniciar" class="btn-primario">Comenzar Ahora</button>
    </div>

    <div id="pantalla-pregunta" class="pregunta-box">
        <span class="texto-pregunta" id="texto-pregunta">Cargando...</span>
        
        <div id="zona-dinamica" class="bloque-contenido">
            <div id="espacio-imagen"></div>
            <div id="contenedor-opciones"></div>
        </div>

        <div class="timer-container">
            <div id="barra-progreso" class="timer-bar"></div>
        </div>
        <p class="contador-texto">Pregunta en curso: <span id="contador-numero">15</span>s</p>
        
        <button id="btnSiguiente" class="btn-siguiente" disabled>Siguiente Pregunta</button>
    </div>

    <div id="pantalla-final" style="display:none;">
        <h3>Examen Finalizado</h3>
        <div id="resultado-detalle" style="margin: 25px 0; font-size: 1.8em; font-weight: bold; color: #007bff;"></div>
        <button onclick="location.reload()" class="btn-primario">Volver a intentar</button>
    </div>
</div>

<audio id="reproductor"></audio>

<script>
    // Llave de respuestas extraída directamente de tu imagen OMR (0=A, 1=B, 2=C, 3=D)
    const _k = [0,3,2,0,2,0,2,2,1,0,3,2,1,3,3,2,3,2,0,3,0,1,3,2,0, 1,3,0,1, 2,2,1,2,3,3,0,3,0,1,0,1,3,2,0,0,0,2,2,0,3]; 

    const examenData = [
        { audio: "1_A.mp3", pregunta: "Pregunta 1", imagen: "1_A.png", tipo: "visual" },
        { audio: "2_A.mp3", pregunta: "Pregunta 2", imagen: "2_A.png", tipo: "visual" },
        { audio: "3_A.mp3", pregunta: "Pregunta 3", imagen: "3_A.png", tipo: "visual" },
        { audio: "4_A.mp3", pregunta: "Pregunta 4", imagen: "4_A.png", tipo: "visual" },
        { audio: "5_A.mp3", pregunta: "Pregunta 5", imagen: "5_A.png", tipo: "visual" },
        { audio: "6_A.mp3", pregunta: "Pregunta 6", imagen: "6_A.png", tipo: "visual" },
        { audio: "7_A.mp3", pregunta: "Pregunta 7", imagen: "7_A.png", tipo: "visual" },
        { audio: "8_A.mp3", pregunta: "Pregunta 8", imagen: "8_A.png", tipo: "visual" },
        { audio: "9_A.mp3", pregunta: "Pregunta 9", imagen: "9_A.png", tipo: "visual" },
        { audio: "10_A.mp3", pregunta: "Pregunta 10", imagen: "10_A.png", tipo: "visual" },
        { audio: "11_A.mp3", pregunta: "Pregunta 11", imagen: "11_A.png", tipo: "visual" },
        { audio: "12_A.mp3", pregunta: "Pregunta 12", imagen: "12_A.png", tipo: "visual" },
        { audio: "13_A.mp3", pregunta: "Pregunta 13", imagen: "13_A.png", tipo: "visual" },
        { audio: "14_A.mp3", pregunta: "Pregunta 14", imagen: "14_A.png", tipo: "visual" },
        { audio: "15_A.mp3", pregunta: "Pregunta 15", imagen: "15_A.png", tipo: "visual" },
        { audio: "16_A.mp3", pregunta: "Pregunta 16", imagen: "16_A.png", tipo: "visual" },
        { audio: "17_A.mp3", pregunta: "Pregunta 17", imagen: "17_A.png", tipo: "visual" },
        { audio: "18_A.mp3", pregunta: "Pregunta 18", imagen: "18_A.png", tipo: "visual" },
        { audio: "19_A.mp3", pregunta: "Pregunta 19", imagen: "19_A.png", tipo: "visual" },
        { audio: "20_A.mp3", pregunta: "Pregunta 20", tipo: "texto", opciones: ["How are you?", "What are you?", "See you later.", "I'm a student."] },
        { audio: "21_A.mp3", pregunta: "Pregunta 21", tipo: "texto", opciones: ["It's Monday.", "It's 3 o'clock.", "It's a television.", "It's a notebook."] },
        { audio: "22_A.mp3", pregunta: "Pregunta 22", tipo: "texto", opciones: ["Five dollars.", "Mary Smith.", "He's a pilot.", "Sit down."] },
        { audio: "23_A.mp3", pregunta: "Pregunta 23", tipo: "texto", opciones: ["In the lab.", "I'm a cook.", "It's 5 o'clock.", "Fine, thanks."] },
        { audio: "24_A.mp3", pregunta: "Pregunta 24", tipo: "texto", opciones: ["66", "60", "16", "61"] },
        { audio: "25_A.mp3", pregunta: "Pregunta 25", tipo: "texto", opciones: ["49", "94", "19", "14"] },
        { audio: null, pregunta: "26. He is a mechanic. ____ name is Bob Smith.", imagen: "26_A.png", tipo: "etapa2", opciones: ["Her", "His", "Your", "This"] },
        { audio: null, pregunta: "27. This is a ____.", imagen: "27_A.png", tipo: "etapa2", opciones: ["teacher", "weekend", "window", "classroom"] },
        { audio: null, pregunta: "28. The box is ____ the table.", imagen: "28_A.png", tipo: "etapa2", opciones: ["on", "under", "to", "in"] },
        { audio: null, pregunta: "29. The box is ____ the table.", imagen: "29_A.png", tipo: "etapa2", opciones: ["in", "under", "to", "on"] },
        { audio: null, pregunta: "30. ____ are pilots.", tipo: "texto", opciones: ["He", "I", "They", "She"] },
        { audio: null, pregunta: "31. They aren't students. ____ teachers?", tipo: "texto", opciones: ["Is he", "Is she", "Are they", "Are we"] },
        { audio: null, pregunta: "32. ____ the letter D, please.", tipo: "texto", opciones: ["Sit", "Circle", "Turn on", "Turn off"] },
        { audio: null, pregunta: "33. Please, ____ the board.", tipo: "texto", opciones: ["turn on", "turn off", "look at", "listen to"] },
        { audio: null, pregunta: "34. That ____ a television.", tipo: "texto", opciones: ["are", "am", "and", "is"] },
        { audio: null, pregunta: "35. Open the ____.", tipo: "texto", opciones: ["penny", "number", "name", "window"] },
        { audio: null, pregunta: "36. ____ a mechanic.", tipo: "texto", opciones: ["She's", "We're", "They are", "These are"] },
        { audio: null, pregunta: "37. Forty-two = ____.", tipo: "texto", opciones: ["14", "24", "40", "42"] },
        { audio: null, pregunta: "38. A dollar is ____ cents.", tipo: "texto", opciones: ["100", "25", "10", "50"] },
        { audio: null, pregunta: "39. I ____ a student.", tipo: "texto", opciones: ["is", "am", "are", "and"] },
        { audio: null, pregunta: "40. These are ____.", tipo: "texto", opciones: ["maps", "tape", "penny", "desk"] },
        { audio: null, pregunta: "41. Close the ____.", tipo: "texto", opciones: ["nickel", "door", "name", "number"] },
        { audio: null, pregunta: "42. Those ____ pencils.", tipo: "texto", opciones: ["is", "am", "and", "are"] },
        { audio: null, pregunta: "43. ____ the box on the table.", tipo: "texto", opciones: ["Listen", "Up", "Put", "Go"] },
        { audio: null, pregunta: "44. Bill: Listen to the tape. ____ write. \n Tom: Okay.", tipo: "texto", opciones: ["Don't", "Hello", "What", "Good-bye"] },
        { audio: null, pregunta: "45. Bill: Please, spell that. \n Tom: It's ____.", tipo: "texto", opciones: ["$10", "5 cents", "a dollar", "J-o-e"] },
        { audio: null, pregunta: "46. Bill: What's that? \n Tom: ____ a radio.", tipo: "texto", opciones: ["It's", "She's", "He's", "I'm"] },
        { audio: null, pregunta: "47. Bill: Is that his dollar? \n Tom: Yes, ____.", tipo: "texto", opciones: ["he is", "I am", "it is", "they are"] },
        { audio: null, pregunta: "48. Bill: Is Joe a barber? \n Tom: No, he ____ a barber.", tipo: "texto", opciones: ["not", "isn't not", "isn't", "is"] },
        { audio: null, pregunta: "49. Bill: ____ Sam? \n Tom: He's a teacher.", tipo: "texto", opciones: ["What's", "This", "Is", "It"] },
        { audio: null, pregunta: "50. Bill: Good Morning. It's 7:30. It's time for class. \n Tom: No, it isn't. It's the ____.", tipo: "texto", opciones: ["clock", "number", "calendar", "weekend"] }
    ];

    let indice = 0, respuestas = [], intervalo, temporizador, enPausa = false;
    let imgOk = false, audioOk = false;
    let chequeoRedIntervalo = null;
    const TOTAL_TIEMPO = 15000;

    const reproductor = document.getElementById('reproductor');
    const avisoRed = document.getElementById('aviso-conexion');
    const btnSiguiente = document.getElementById('btnSiguiente');

    window.addEventListener('keydown', (e) => {
        if (e.keyCode == 123 || (e.ctrlKey && (e.keyCode == 85 || (e.shiftKey && e.keyCode == 73)))) e.preventDefault();
    });

    function pausarPorRed() {
        if (enPausa) return;
        enPausa = true;
        avisoRed.style.display = 'flex';
        reproductor.pause();
        clearInterval(intervalo);
        clearTimeout(temporizador);
        document.getElementById('barra-progreso').style.transition = 'none';

        if (!chequeoRedIntervalo) {
            chequeoRedIntervalo = setInterval(() => {
                if (navigator.onLine) cargarRecursosPreguntaActual();
            }, 1000);
        }
    }

    function cargarRecursosPreguntaActual() {
        const data = examenData[indice];
        imgOk = data.tipo === "texto" || !data.imagen; 
        audioOk = data.audio === null;

        if (data.imagen) {
            const img = new Image();
            img.src = data.imagen + "?t=" + Date.now();
            img.onload = () => { imgOk = true; verificarSiPodemosSeguir(); };
        }

        if (data.audio) {
            reproductor.src = data.audio + "?t=" + Date.now();
            reproductor.oncanplaythrough = () => { audioOk = true; verificarSiPodemosSeguir(); };
            reproductor.load();
        } else {
            verificarSiPodemosSeguir();
        }
    }

    function verificarSiPodemosSeguir() {
        if (imgOk && audioOk && navigator.onLine) {
            clearInterval(chequeoRedIntervalo);
            chequeoRedIntervalo = null;
            enPausa = false;
            avisoRed.style.display = 'none';
            if (examenData[indice].audio) reproductor.play().catch(() => {});
            empezarTimer(TOTAL_TIEMPO);
        }
    }

    window.addEventListener('offline', pausarPorRed);

    document.getElementById('btnIniciar').onclick = () => {
        document.getElementById('pantalla-inicio').style.display = 'none';
        document.getElementById('pantalla-pregunta').style.display = 'block';
        mostrarPregunta();
    };

    function habilitarSiguiente() {
        btnSiguiente.disabled = false;
    }

    function mostrarPregunta() {
        if (indice >= examenData.length) return finalizar();
        
        btnSiguiente.disabled = true; // Resetear botón
        const data = examenData[indice];
        const zona = document.getElementById('zona-dinamica');
        zona.innerHTML = '<div id="espacio-imagen"></div><div id="contenedor-opciones"></div>';
        
        const espacioImg = document.getElementById('espacio-imagen');
        const contenedorOpts = document.getElementById('contenedor-opciones');

        if (data.tipo === "visual") {
            document.getElementById('texto-pregunta').innerText = data.pregunta;
            contenedorOpts.className = "contenedor-opciones-circular";
            const img = document.createElement('img');
            img.className = 'imagen-pregunta';
            img.src = data.imagen;
            espacioImg.appendChild(img);

            ['A', 'B', 'C', 'D'].forEach((letra, i) => {
                const div = document.createElement('div');
                div.className = 'division-opcion';
                const btn = document.createElement('button');
                btn.className = 'opcion-btn-circular';
                btn.innerText = letra;
                btn.onclick = () => {
                    document.querySelectorAll('.opcion-btn-circular').forEach(b => b.classList.remove('seleccionada'));
                    btn.classList.add('seleccionada');
                    respuestas[indice] = i;
                    habilitarSiguiente();
                };
                div.appendChild(btn);
                contenedorOpts.appendChild(div);
            });
        } 
        else if (data.tipo === "texto") {
            document.getElementById('texto-pregunta').innerText = data.pregunta;
            contenedorOpts.className = "contenedor-opciones-vertical";
            data.opciones.forEach((texto, i) => {
                const btn = document.createElement('button');
                btn.className = 'opcion-btn-vertical';
                btn.innerHTML = `<strong>${String.fromCharCode(65 + i)}.</strong>  ${texto}`;
                btn.onclick = () => {
                    document.querySelectorAll('.opcion-btn-vertical').forEach(b => b.classList.remove('seleccionada'));
                    btn.classList.add('seleccionada');
                    respuestas[indice] = i;
                    habilitarSiguiente();
                };
                contenedorOpts.appendChild(btn);
            });
        }
        else if (data.tipo === "etapa2") {
            document.getElementById('texto-pregunta').innerText = "Segunda Etapa del Examen";
            zona.innerHTML = `
                <div class="layout-etapa2">
                    <img src="${data.imagen}" class="img-lateral">
                    <div class="columna-opciones">
                        <p style="font-size:1.3em; font-weight:bold; margin-bottom:15px;">${data.pregunta}</p>
                        <div id="sub-opts"></div>
                    </div>
                </div>`;
            const subOpts = document.getElementById('sub-opts');
            data.opciones.forEach((texto, i) => {
                const btn = document.createElement('button');
                btn.className = 'opcion-btn-vertical';
                btn.style.marginBottom = "8px";
                btn.innerHTML = `<strong>${String.fromCharCode(65 + i)}.</strong> ${texto}`;
                btn.onclick = () => {
                    document.querySelectorAll('.opcion-btn-vertical').forEach(b => b.classList.remove('seleccionada'));
                    btn.classList.add('seleccionada');
                    respuestas[indice] = i;
                    habilitarSiguiente();
                };
                subOpts.appendChild(btn);
            });
        }

        cargarRecursosPreguntaActual();
    }

    function empezarTimer(ms) {
        clearInterval(intervalo);
        clearTimeout(temporizador);
        let queda = ms;
        const barra = document.getElementById('barra-progreso');
        barra.style.transition = 'none';
        barra.style.width = '100%';
        
        setTimeout(() => {
            if (enPausa) return;
            barra.style.transition = `width ${ms}ms linear`;
            barra.style.width = '0%';
        }, 50);

        intervalo = setInterval(() => {
            if (!enPausa) {
                queda -= 1000;
                if (queda >= 0) document.getElementById('contador-numero').innerText = Math.ceil(queda / 1000);
            }
        }, 1000);

        temporizador = setTimeout(() => {
            if (!enPausa) {
                indice++;
                mostrarPregunta();
            }
        }, ms);
    }

    function finalizar() {
        document.getElementById('pantalla-pregunta').style.display = 'none';
        document.getElementById('pantalla-final').style.display = 'block';
        const aciertos = respuestas.filter((r, i) => r === _k[i]).length;
        document.getElementById('resultado-detalle').innerText = `Aciertos: ${aciertos} / ${examenData.length}`;
    }

    btnSiguiente.onclick = function() {
        if (!enPausa && !this.disabled) {
            clearInterval(intervalo);
            clearTimeout(temporizador);
            indice++;
            mostrarPregunta();
        }
    };
</script>
</body>
</html>
